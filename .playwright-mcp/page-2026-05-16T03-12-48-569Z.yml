                        - paragraph [ref=e369]: "Category: real problem needing a decision. The household is in this situation because direct cash is modeled at $50,000 while the target cash runway is $103,571, leaving a $53,571 gap. That is only about 0.39 years of selected core spend and 8.7 months of essential-plus-fixed spending, while salary is scheduled to stop on 2027-07-01 and the selected retirement spend path begins at $104,000 including travel. This does not mean the Monte Carlo plan fails; it means the operational cash buffer is not yet aligned with the transition plan, so bill-paying and transfer timing could be uncomfortable even if the portfolio is solvent. The household has not yet stated its intent. Likely resolution paths are: fund the cash bucket from taxable or other available liquidity, reduce or redirect late-career payroll deferrals to build cash before salary ends, or explicitly document backup liquidity and waive the 18-month target. It would look like a model/data bug rather than a real issue if bank balances are stale, brokerage cash is being excluded or double-counted, or the essential-plus-fixed monthly number is not tied to the current spending seed."
